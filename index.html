<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xephortia Elections System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f0f2f5; }
.header {
  background-color: #ffffff;
  padding: 1rem;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: center;   /* 👈 CENTER EVERYTHING */
  align-items: center;
  gap: 10px;                 /* 👈 spacing between logo + text */
}

.header-title {
  margin: 0;                 /* ❌ remove auto margins */
  font-size: 1.75rem;
  font-weight: bold;
  color: #333;
  text-align: center;
}

.header-logo { height: 60px; }
.header-title { font-size: 1.75rem; font-weight: bold; color: #333; }
.holding-page { text-align: center; padding: 5rem 1rem; }

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

  .header {
    flex-direction: column;
    text-align: center;
    gap: 10px;
  }

  .header-logo {
    height: 40px;
  }

  .header-title {
    font-size: 1.3rem;
  }

  .holding-page {
    padding: 2rem 1rem;
  }

  .card {
    margin: 10px;
  }

  .chart-container {
    height: 200px;
  }

}
  
</style>
</head>

<body>

<header class="header">
  <img src="logo.png" class="header-logo">
  <h1 class="header-title">Xephortia Elections System</h1>
</header>

<main class="container">

<div class="holding-page" id="mainContainer">

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3">Checking for active election...</p>
  </div>

</div>

</main>

<div class="text-center my-4">
  <button id="logoutBtn" class="btn btn-danger">
    Logout
  </button>
</div>
  
<footer class="text-center text-muted py-4">
  <p>© 2026 Government of Xephortia. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvRFkA5mDchs0gb24cqtL5AB1fL-7zLd8",
  authDomain: "xephortia-micronation.firebaseapp.com",
  projectId: "xephortia-micronation",
  storageBucket: "xephortia-micronation.firebasestorage.app",
  messagingSenderId: "521046704756",
  appId: "1:521046704756:web:8ca26309135109d0608721"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Protect page
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // ✅ user is logged in, now verify citizen allowlist
  const container = document.getElementById("mainContainer");
  const loading = document.getElementById("loading");

  const citizenEmail = user.email;

  if (!citizenEmail) {
    loading.style.display = "none";
    container.innerHTML = `
      <div class="card">
        <div class="card-body text-center">
          <h2 class="card-title text-danger">Access Denied</h2>
          <p>Your account does not have an email attached.</p>
          <p>Please sign in with an approved Google or Microsoft account.</p>
        </div>
      </div>
    `;
    return;
  }

  const citizenRef = doc(db, "citizens", citizenEmail);
  const citizenSnap = await getDoc(citizenRef);

  if (!citizenSnap.exists()) {
    loading.style.display = "none";
    container.innerHTML = `
      <div class="card">
        <div class="card-body text-center">
          <h2 class="card-title text-danger">Access Denied</h2>
          <p>This email is not registered as an approved citizen voter.</p>
          <p><strong>${citizenEmail}</strong></p>
          <p class="text-muted">Please contact the Election Administration.</p>
        </div>
      </div>
    `;
    return;
  }

  const docRef = doc(db, "activeElection", "current");
  const docSnap = await getDoc(docRef);

  loading.style.display = "none";

  if (docSnap.exists()) {
    const data = docSnap.data();

    const now = Date.now();

    if (data.status === "active" && now < data.endTime) {

    container.innerHTML = `
      <div class="card">
        <div class="card-body">
          <h2 class="card-title">Active Election</h2>
          <p class="card-text">Cast your vote below.</p>

          <div id="voteButtons"></div>
        </div>
      </div>
    `;

    const voteContainer = document.getElementById("voteButtons");

  data.candidates.forEach(candidate => {
  const btn = document.createElement("button");
  btn.className = "btn btn-primary w-100 mb-2 py-2";
  btn.innerText = `Vote for ${candidate}`;

  btn.onclick = async () => {
    const user = auth.currentUser;

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    // 🔐 One fixed document per voter per election.
    // This lets Firestore Rules block duplicate votes at database level.
    const voteDocId = `${data.id}_${user.uid}`;
    const voteRef = doc(db, "votes", voteDocId);

    const existingVote = await getDoc(voteRef);

    if (existingVote.exists()) {
      alert("❌ You have already voted!");
      return;
    }

    // ✅ Save vote using fixed document ID, not a random addDoc ID
    await setDoc(voteRef, {
      userId: user.uid,
      candidate: candidate,
      electionId: data.id,
      createdAt: serverTimestamp()
    });

    alert("✅ Vote submitted successfully!");

    // 🔒 Disable buttons after voting
    document.querySelectorAll("#voteButtons button").forEach(b => {
      b.disabled = true;
    });
  };

  voteContainer.appendChild(btn);
});

    } else {
  container.innerHTML = `
    <div class="card">
      <div class="card-body text-center">
        <h2 class="card-title">No Active Election</h2>
        <p>There are currently no active or scheduled elections.</p>

        <div class="mt-4">
          <a href="results.html" class="btn btn-primary">
            View Past Election Results
          </a>
        </div>

        <p class="mt-3">Please check back later.</p>
      </div>
    </div>
  `;
}

  } // ✅ CLOSE docSnap.exists()

  else {
  container.innerHTML = `
    <div class="card">
      <div class="card-body text-center">
        <h2 class="card-title">No Active Election</h2>
        <p>There are currently no active or scheduled elections.</p>

        <div class="mt-4">
          <a href="results.html" class="btn btn-primary">
            View Past Election Results
          </a>
        </div>

        <p class="mt-3">Please check back later.</p>
      </div>
    </div>
  `;
}

  });

// logout
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};
</script>
  
</body>
</html>
